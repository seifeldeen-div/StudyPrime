<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPrime</title>
    <link rel="stylesheet" href="../css/todoList.css">
    <!-- main web app icon -->
    <link rel="icon" href="../icons/icon-192x192.png">
    <!-- nav - header Style -->
    <link rel="stylesheet" href="../css/navHeader.css">
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header>
        <div class="container">
            <div class="top">
                <div class="header-top-content">
                    <h2 id="welcomeMessage" class="gradient-text">Mode State</h2>
                    <p class="time">00:00:00 <span>PM</span></p>
                    <p class="datePara">Monday, May 8</p>
                </div>
                <div class="header-top-icons-btns">
                    <div id="darkLightMode" class="mode">
                        <i class="fa-solid fa-moon moon"></i>
                        <i class="fa-solid fa-sun sun"></i>
                    </div>
                    <div id="voluomMuteSound" class="volums">
                        <i class="fa-solid fa-volume-xmark mute"></i>
                        <i class="fa-solid fa-volume-high sound"></i>
                    </div>
                </div>
            </div>
            <div class="bottom">
                <div class="bottom-qoute">
                    <p class="quote">"Believe in your potential"</p>
                </div>
            </div>
        </div>
        <div class="progressPar">
            <div class="text">
                <span class="rangeTitle">Task Progress</span>
                <span class="ratio">0%</span>
            </div>
            <div class="inputRange">
                <input id="inputRangeField" type="range" value="0">
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="heading">
                <h2>
                    <i class="fa-regular fa-calendar-check"></i>
                    To-Do-List
                </h2>
            </div>
            <div class="btns-input">
                <form id="form" action="">
                    <input id="inputField" type="text" placeholder="Add new task...">
                    <!-- <input type="submit" value="Add"> -->
                    <button id="addBtn" type="submit">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </form>
            </div>
            <div class="table-tasks">
                <ul id="table">
                    <p class="note">No tasks yet. Add one above !</p>
                    <li id="tableChild" style="display: none;">
                        <div>
                            <input type="checkbox">
                            <span class="left">
                                Task 1
                            </span>
                        </div>
                        <span class="right" id="trashIconContainer">
                            <i id="trashIcon" class="fa-regular fa-trash-can"></i>
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </main>
    <nav class="navCardStyle">
        <div class="container">
            <ul>
                <li class="active">
                    <a class="link" href="home.html">
                        <i class="fa-solid fa-clock-rotate-left"></i></a>
                </li>
                <li>
                    <a class="link" href="#"><i class="fa-regular fa-calendar-check"></i></a>
                </li>
                <li>
                    <a class="link" href="timer.html"><i class="fa-regular fa-clock"></i></a>
                </li>
                <li>
                    <a class="link" href="goals.html"><i class="fa-solid fa-bullseye"></i></a>
                </li>
                <!-- <li>
                    <a class="link" href="#"><i class="fa-solid fa-hourglass-end"></i></a>
                </li> -->
                <li>
                    <a class="link" href="note.html"><i class="fa-regular fa-note-sticky"></i></a>
                </li>
            </ul>
        </div>
    </nav>
    <!-- ------------------------errorBadge----------------------- -->
    <div class="errorBadge">
        <p></p>
    </div>
    <div class="webPhone">
        <h1>Web App Phone</h1>
        <h2>Open Your Phone To Show Content</h2>
    </div>
    <!-- scricri main file -->
    <script src="../js/todoList.js"></script>
    <script src="../js/navHeader.js"></script>
</body>

</html>
